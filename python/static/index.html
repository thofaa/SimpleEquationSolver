<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Equation Solver</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; }
      label, input, button { display:block; width:100%; margin-bottom:8px }
      pre { background:#f4f4f4; padding:10px }
    </style>
  </head>
  <body>
    <h1>Equation Solver</h1>
    <label>Equation (use =):
      <input id="equation" value="2*x + 3 = 7" />
    </label>
    <label>Variable name:
      <input id="variable" value="x" />
    </label>
    <button id="solve">Solve</button>

    <h2>Result</h2>
    <pre id="result">(no result yet)</pre>

    <script>
      document.getElementById('solve').addEventListener('click', async () => {
        const equation = document.getElementById('equation').value;
        const variable = document.getElementById('variable').value || 'x';

        const res = await fetch('/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ equation, variable })
        });

        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      });
    </script>
  </body>
</html>
